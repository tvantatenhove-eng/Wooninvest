<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoonInvest — Buurtverkenner Leidschendam-Voorburg</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2a5e;--navy2:#1a3f7a;--navy3:#dce6f5;
  --lime:#c8d400;--lime2:#a8b200;
  --bg:#f2f1ec;--bg2:#e8e6df;--white:#fff;
  --text:#0f0f0f;--text2:#3a3a3a;--text3:#777;
  --border:#dbd9d2;
  --s5:#1a6b3c;--s4:#5aab35;--s3:#c8d400;--s2:#e87000;--s1:#c0390b;--s0:#7a0020;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* ── LAYOUT ── */
.shell{display:flex;flex-direction:column;height:100vh}
.bar{background:var(--navy);height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:900}
.bar-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff}
.bar-brand em{color:var(--lime);font-style:normal}
.bar-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-left:12px;padding-left:12px;border-left:1px solid rgba(255,255,255,0.15)}
.bar-pills{display:flex;gap:5px}
.xp{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px}
.xp.ok{background:rgba(200,212,0,0.22);color:var(--lime)}
.xp.err{background:rgba(192,57,11,0.3);color:#ff9070}
.xp.spin{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)}

.body{display:flex;flex:1;overflow:hidden}
.panel{width:300px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* ── PANEL TOP: mode tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 4px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
.tab.active{color:var(--navy);border-color:var(--navy)}
.tab:hover:not(.active){color:var(--text2);background:var(--bg)}

/* ── PANEL SCROLL ── */
.panel-body{flex:1;overflow-y:auto;padding:14px}

/* ── SCORE CARD (selected buurt) ── */
.sel-card{background:var(--navy);border-radius:12px;padding:16px;margin-bottom:14px;display:none}
.sel-card.show{display:block}
.sel-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff;margin-bottom:4px}
.sel-wijk{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:12px}
.score-big{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.score-num{font-family:'Syne',sans-serif;font-weight:800;font-size:36px;line-height:1}
.score-label{font-size:11px;color:rgba(255,255,255,0.6);line-height:1.4}
.score-bar-wrap{background:rgba(255,255,255,0.12);border-radius:4px;height:6px;overflow:hidden;margin-bottom:12px}
.score-bar-fill{height:100%;border-radius:4px;transition:width 0.4s ease}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kpi{background:rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px}
.kpi-val{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#fff;line-height:1}
.kpi-lbl{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;line-height:1.3}
.kpi-vs{font-size:9px;margin-top:3px;font-weight:500}
.kpi-vs.better{color:#7de07d}
.kpi-vs.worse{color:#ff9070}
.kpi-vs.neutral{color:rgba(255,255,255,0.35)}

/* ── GEMEENTE GEMIDDELDEN ── */
.avg-section{margin-bottom:14px}
.section-lbl{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.avg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.avg-card{background:var(--bg);border-radius:8px;padding:8px 10px}
.avg-val{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--navy);line-height:1}
.avg-lbl{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.3}

/* ── BUURT RANGLIJST ── */
.rank-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background 0.12s;border:1.5px solid transparent}
.rank-item:hover{background:var(--bg)}
.rank-item.active{background:var(--navy3);border-color:var(--navy2)}
.rank-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rank-name{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-score{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;padding:2px 7px;border-radius:8px}

/* ── MAP OVERLAYS ── */
.moverlay{position:absolute;z-index:800;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.legend{bottom:18px;left:12px;padding:11px 13px}
.ltitle{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;color:var(--text2);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.07em}
.lrow{display:flex;align-items:center;gap:7px;margin-bottom:3px;font-size:11px;color:var(--text2)}
.lsw{width:12px;height:12px;border-radius:2px;flex-shrink:0}

.mode-bar{top:12px;right:12px;display:flex;overflow:hidden;border-radius:8px}
.mmode{padding:7px 13px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:var(--white);color:var(--text2);transition:all 0.12s;white-space:nowrap}
.mmode:hover{background:var(--bg)}
.mmode.active{background:var(--navy);color:#fff}

/* ── LOADING OVERLAY ── */
.map-loader{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(242,241,236,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:700;transition:opacity 0.4s}
.map-loader.hidden{opacity:0;pointer-events:none}
.loader-spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
.loader-msg{font-size:13px;color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">

<!-- BAR -->
<div class="bar">
  <div style="display:flex;align-items:center">
    <div class="bar-brand">Woon<em>Invest</em></div>
    <div class="bar-sub">Buurtverkenner — Leidschendam-Voorburg</div>
  </div>
  <div class="bar-pills" id="pills">
    <span class="xp spin" id="p-geo">⏳ kaart</span>
    <span class="xp spin" id="p-cbs">⏳ CBS 2025</span>
    <span class="xp spin" id="p-lbm">⏳ leefbaarheid</span>
  </div>
</div>

<div class="body">

<!-- PANEL -->
<div class="panel">
  <div class="tabs">
    <div class="tab active" id="tab-score" onclick="switchTab('score')">Score</div>
    <div class="tab" id="tab-uitk"  onclick="switchTab('uitk')">Uitkeringen</div>
    <div class="tab" id="tab-ink"   onclick="switchTab('ink')">Inkomen</div>
    <div class="tab" id="tab-arm"   onclick="switchTab('arm')">Armoede</div>
    <div class="tab" id="tab-huur"  onclick="switchTab('huur')">Corp. huur</div>
  </div>

  <div class="panel-body">

    <!-- Selected buurt card -->
    <div class="sel-card" id="sel-card">
      <div class="sel-name" id="sel-name">—</div>
      <div class="sel-wijk" id="sel-wijk"></div>
      <div class="score-big">
        <div class="score-num" id="sel-score">—</div>
        <div class="score-label">Kwetsbaarheid&shy;score<br><span id="sel-score-label" style="color:rgba(255,255,255,0.7)"></span></div>
      </div>
      <div class="score-bar-wrap"><div class="score-bar-fill" id="sel-bar"></div></div>
      <div class="kpi-grid" id="sel-kpis"></div>
    </div>

    <!-- Gemeente gemiddelden -->
    <div class="avg-section">
      <div class="section-lbl">Gemeente gemiddeld</div>
      <div class="avg-grid">
        <div class="avg-card"><div class="avg-val" id="avg-uitk">—</div><div class="avg-lbl">Uitkeringen %</div></div>
        <div class="avg-card"><div class="avg-val" id="avg-ink">—</div><div class="avg-lbl">Inkomen x€1k</div></div>
        <div class="avg-card"><div class="avg-val" id="avg-arm">—</div><div class="avg-lbl">In armoede %</div></div>
        <div class="avg-card"><div class="avg-val" id="avg-huur">—</div><div class="avg-lbl">Corp. huur %</div></div>
      </div>
    </div>

    <!-- Ranglijst -->
    <div>
      <div class="section-lbl" id="rank-lbl">Buurten op score</div>
      <div id="rank-list"></div>
    </div>

  </div>
</div>

<!-- MAP -->
<div class="map-wrap">
  <div id="map"></div>

  <!-- Mode switcher -->
  <div class="moverlay mode-bar">
    <button class="mmode active" id="m-score"   onclick="setMapMode('score')">Compositescore</button>
    <button class="mmode"        id="m-uitk"    onclick="setMapMode('uitk')">Uitkeringen</button>
    <button class="mmode"        id="m-ink"     onclick="setMapMode('ink')">Inkomen</button>
    <button class="mmode"        id="m-arm"     onclick="setMapMode('arm')">Armoede</button>
    <button class="mmode"        id="m-huur"    onclick="setMapMode('huur')">Corp. huur</button>
    <button class="mmode"        id="m-lbm"     onclick="setMapMode('lbm')" disabled style="opacity:.4">Leefbaarheid</button>
  </div>

  <!-- Legend -->
  <div class="moverlay legend" id="legend">
    <div class="ltitle" id="ltitle">Kwetsbaarheidscore</div>
    <div id="litems"></div>
    <div id="lsrc" style="font-size:9px;color:var(--text3);margin-top:6px;padding-top:5px;border-top:1px solid var(--border)"></div>
  </div>

  <!-- Loading overlay -->
  <div class="map-loader" id="loader">
    <div class="loader-spin"></div>
    <div class="loader-msg" id="loader-msg">Buurten en CBS-data laden...</div>
  </div>
</div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const GM = '0546';
const CBS_TABLE = '86165NED';

// Score weights — higher = more kwetsbaar → higher score (0–100, higher = more at risk)
const SCORE_WEIGHTS = {
  uitkering: { w:0.25, dir:'high_bad' },  // high = bad
  inkomen:   { w:0.20, dir:'low_bad'  },  // low = bad
  armoede:   { w:0.30, dir:'high_bad' },  // high = bad
  huurcorp:  { w:0.15, dir:'high_bad' },  // high = bad (proxy voor sociale huur concentratie)
  lbm:       { w:0.10, dir:'low_bad'  },  // low = bad (only if available)
};

const FIELD_CANDIDATES = {
  inwoners:  ['AantalInwoners_5','AantalInwoners_6','AantalInwoners_7'],
  inkomen:   ['GemiddeldInkomenPerInwoner_66','GemiddeldInkomenPerInwoner_67','GemiddeldInkomenPerInwoner_68',
              'GemiddeldPersoonlijkInkomenX1000_66','GemiddeldPersoonlijkInkomenX1000_67','GemiddeldPersoonlijkInkomenX1000_68'],
  uitkering: ['PersonenMetEenUitkering_79','PersonenMetEenUitkering_80','PersonenMetEenUitkering_81'],
  huurcorp:  ['HuurwoningenInBezitVanEenWoningco_197','HuurwoningenInBezitVanEenWoningco_198','HuurwoningenInBezitVanEenWoningco_199'],
  armoede:   ['PersonenInArmoede_83','PersonenInArmoede_84','PersonenInArmoede_85',
              'k_40PersonenMetLaagsteInkomen_70','k_40PersonenMetLaagsteInkomen_71'],
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let map, geoLayer;
let cbsData = {}, cbsFields = {};
let lbmData = {};
let geoFeatures = [];
let scores = {};       // buurtcode -> 0-100
let selectedCode = null;
let mapMode = 'score';
let panelTab = 'score';

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  initMap();
  renderLegend();
  const [,cbsOk] = await Promise.all([loadGeo(), loadCBS()]);
  await loadLeefbaarometer();
  computeScores();
  renderGeoLayer();
  renderRankList();
  renderAvgCards();
  hideLoader();
});

// ═══════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════
function initMap() {
  map = L.map('map', { zoomControl:true, center:[52.079, 4.393], zoom:13 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { attribution:'© OpenStreetMap © CartoDB', maxZoom:19 }).addTo(map);
  setTimeout(() => { map.invalidateSize(); map.setView([52.079,4.393],13); }, 200);
}

function renderGeoLayer() {
  if (geoLayer) geoLayer.remove();
  if (!geoFeatures.length) return;
  geoLayer = L.geoJSON({ type:'FeatureCollection', features:geoFeatures }, {
    style: f => {
      const code = norm(f.properties.buurtcode);
      return { fillColor:getColor(code), fillOpacity:0.72, color:'#fff', weight:1.5 };
    },
    onEachFeature: (f, layer) => {
      const code = norm(f.properties.buurtcode);
      const naam = f.properties.buurtnaam || code;
      layer.on('click',     () => selectBuurt(code, naam, layer));
      layer.on('mouseover', () => layer.setStyle({ fillOpacity:0.92, weight:2.5 }));
      layer.on('mouseout',  () => {
        if (selectedCode !== code) layer.setStyle({ fillOpacity:0.72, weight:1.5 });
      });
    }
  }).addTo(map);
  const b = geoLayer.getBounds();
  if (b && b.isValid()) map.fitBounds(b, { padding:[16,16], maxZoom:14 });
}

function norm(c) { return (c||'').trim().toUpperCase(); }

// ═══════════════════════════════════════════
// SELECT BUURT
// ═══════════════════════════════════════════
function selectBuurt(code, naam, layer) {
  selectedCode = code;

  // reset all layers
  if (geoLayer) geoLayer.eachLayer(l =>
    l.setStyle({ fillOpacity:0.72, weight:1.5 }));
  if (layer) layer.setStyle({ fillOpacity:0.95, weight:3 });

  // highlight in rank list
  document.querySelectorAll('.rank-item').forEach(el => {
    el.classList.toggle('active', el.dataset.code === code);
  });

  showSelCard(code, naam);
}

function showSelCard(code, naam) {
  const card = document.getElementById('sel-card');
  card.classList.add('show');

  const f = geoFeatures.find(x => norm(x.properties.buurtcode) === code);
  const wijknaam = f?.properties?.wijknaam || '';

  document.getElementById('sel-name').textContent = naam;
  document.getElementById('sel-wijk').textContent = wijknaam ? `Wijk: ${wijknaam}` : '';

  const sc = scores[code] ?? null;
  const scoreEl = document.getElementById('sel-score');
  const barEl   = document.getElementById('sel-bar');
  const lblEl   = document.getElementById('sel-score-label');

  if (sc !== null) {
    scoreEl.textContent = Math.round(sc);
    scoreEl.style.color = scoreColor(sc);
    barEl.style.width = sc + '%';
    barEl.style.background = scoreColor(sc);
    const bands = [{t:20,'l':'Laag risico'},{t:40,'l':'Licht verhoogd'},{t:60,'l':'Gemiddeld'},{t:80,'l':'Verhoogd'},{t:101,'l':'Hoog risico'}];
    lblEl.textContent = bands.find(b => sc < b.t)?.l || 'Hoog risico';
  } else {
    scoreEl.textContent = '—';
    barEl.style.width = '0';
    lblEl.textContent = 'Onvoldoende data';
  }

  // KPIs
  const gm = gmAvg();
  const kpis = [
    { key:'uitkering', lbl:'Uitkeringen', suf:'%',  field:cbsFields.uitkering, dir:'high_bad' },
    { key:'inkomen',   lbl:'Gem. inkomen', suf:'k€', field:cbsFields.inkomen,  dir:'low_bad'  },
    { key:'armoede',   lbl:'In armoede',  suf:'%',  field:cbsFields.armoede,   dir:'high_bad' },
    { key:'huurcorp',  lbl:'Corp. huur',  suf:'%',  field:cbsFields.huurcorp,  dir:'high_bad' },
    { key:'inwoners',  lbl:'Inwoners',    suf:'',   field:cbsFields.inwoners,  dir:'neutral'  },
    { key:'lbm',       lbl:'Leefbaarheid',suf:'',   field:null,                dir:'low_bad'  },
  ];

  document.getElementById('sel-kpis').innerHTML = kpis.map(k => {
    let val, valFmt, vs, vsClass='neutral';
    if (k.key === 'lbm') {
      val = lbmData[code];
      valFmt = val !== undefined ? val.toFixed(1) : '—';
      if (val !== undefined) {
        const avg = lbmAvg();
        const diff = val - avg;
        vs = (diff >= 0 ? '+' : '') + diff.toFixed(1) + ' t.o.v. gem.';
        vsClass = diff >= 0 ? 'better' : 'worse';
      } else vs = '';
    } else {
      val = cbsVal(code, k.field);
      if (val === null) return `<div class="kpi"><div class="kpi-val">—</div><div class="kpi-lbl">${k.lbl}</div></div>`;
      valFmt = k.suf === 'k€'
        ? '€' + Math.round(val) + 'k'
        : (k.key==='inwoners' ? Math.round(val).toLocaleString('nl-NL') : Math.round(val*10)/10 + k.suf);

      if (k.dir !== 'neutral' && gm[k.key] !== null) {
        const diff = val - gm[k.key];
        const pct  = Math.round(Math.abs(diff) / gm[k.key] * 100);
        const worse = k.dir === 'high_bad' ? diff > 0 : diff < 0;
        vs = (diff >= 0 ? '+' : '') + (k.suf==='k€' ? '€'+Math.abs(Math.round(diff))+'k' : Math.round(Math.abs(diff)*10)/10 + k.suf) + ' t.o.v. gem.';
        vsClass = worse ? 'worse' : 'better';
      } else vs = '';
    }
    return `<div class="kpi">
      <div class="kpi-val">${valFmt}</div>
      <div class="kpi-lbl">${k.lbl}</div>
      ${vs ? `<div class="kpi-vs ${vsClass}">${vs}</div>` : ''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// SCORE ENGINE
// ═══════════════════════════════════════════
function computeScores() {
  const codes = buurtCodes();
  if (!codes.length) return;

  // Gather raw values per indicator
  const raw = {};
  codes.forEach(c => {
    raw[c] = {
      uitkering: cbsVal(c, cbsFields.uitkering),
      inkomen:   cbsVal(c, cbsFields.inkomen),
      armoede:   cbsVal(c, cbsFields.armoede),
      huurcorp:  cbsVal(c, cbsFields.huurcorp),
      lbm:       lbmData[c] !== undefined ? lbmData[c] : null,
    };
  });

  // Compute min/max per indicator for normalisation
  const minmax = {};
  Object.keys(SCORE_WEIGHTS).forEach(ind => {
    const vals = codes.map(c => raw[c][ind]).filter(v => v !== null);
    if (!vals.length) { minmax[ind] = null; return; }
    minmax[ind] = { min: Math.min(...vals), max: Math.max(...vals) };
  });

  // Score each buurt
  codes.forEach(c => {
    let total = 0, totalW = 0;
    Object.entries(SCORE_WEIGHTS).forEach(([ind, cfg]) => {
      const mm = minmax[ind];
      const v  = raw[c][ind];
      if (!mm || v === null || mm.max === mm.min) return;
      // Normalise 0–1
      let norm01 = (v - mm.min) / (mm.max - mm.min);
      // For low_bad: invert so high normalised = more at risk
      if (cfg.dir === 'low_bad') norm01 = 1 - norm01;
      total  += norm01 * cfg.w;
      totalW += cfg.w;
    });
    scores[c] = totalW > 0 ? Math.round((total / totalW) * 100) : null;
  });
}

function scoreColor(s) {
  if (s === null) return '#cccccc';
  if (s > 80) return var_c('s0');
  if (s > 65) return var_c('s1');
  if (s > 50) return var_c('s2');
  if (s > 35) return var_c('s3');
  if (s > 20) return var_c('s4');
  return var_c('s5');
}
function var_c(name) {
  return getComputedStyle(document.documentElement).getPropertyValue('--'+name).trim();
}

// ═══════════════════════════════════════════
// COLOR GETTER (per map mode)
// ═══════════════════════════════════════════
function getColor(code) {
  if (mapMode === 'score') return scoreColor(scores[code] ?? null);

  const fieldMap = { uitk:cbsFields.uitkering, ink:cbsFields.inkomen, arm:cbsFields.armoede, huur:cbsFields.huurcorp };
  if (mapMode === 'lbm') {
    const v = lbmData[code];
    if (v === undefined) return '#cccccc';
    return v>2 ? '#1a6b3c' : v>0.5 ? '#5aab35' : v>-0.5 ? '#e87000' : '#c0390b';
  }
  const v = cbsVal(code, fieldMap[mapMode]);
  if (v === null) return '#cccccc';
  if (mapMode === 'uitk') return v>15?'#7a0020':v>10?'#c0390b':v>6?'#e87000':v>3?'#c8d400':'#1a6b3c';
  if (mapMode === 'ink')  return v<20?'#7a0020':v<26?'#c0390b':v<32?'#e87000':v<38?'#c8d400':'#1a6b3c';
  if (mapMode === 'arm')  return v>12?'#7a0020':v>8?'#c0390b':v>5?'#e87000':v>2?'#c8d400':'#1a6b3c';
  if (mapMode === 'huur') return v>60?'#0d2a5e':v>40?'#1a3f7a':v>20?'#5b7fc4':v>5?'#9fbfe8':'#d0e4f7';
  return '#cccccc';
}

// ═══════════════════════════════════════════
// DATA HELPERS
// ═══════════════════════════════════════════
function buurtCodes() {
  const fromCbs = Object.keys(cbsData).filter(c => c.startsWith('BU'));
  const fromGeo = geoFeatures.map(f => norm(f.properties.buurtcode)).filter(Boolean);
  return [...new Set([...fromCbs, ...fromGeo])];
}

function cbsVal(code, field) {
  if (!field || !cbsData[code]) return null;
  const v = cbsData[code][field];
  if (v == null) return null;
  const n = Number(v);
  return n <= -99999990 ? null : n;
}

function gmAvg() {
  const codes = buurtCodes();
  const avg = field => {
    if (!field) return null;
    const vals = codes.map(c => cbsVal(c, field)).filter(v => v !== null);
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  };
  return {
    uitkering: avg(cbsFields.uitkering),
    inkomen:   avg(cbsFields.inkomen),
    armoede:   avg(cbsFields.armoede),
    huurcorp:  avg(cbsFields.huurcorp),
  };
}

function lbmAvg() {
  const vals = Object.values(lbmData).filter(v => v !== null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
}

function getName(code) {
  const f = geoFeatures.find(x => norm(x.properties.buurtcode) === code);
  return (f?.properties?.buurtnaam || cbsData[code]?.WijkenEnBuurten || code).trim();
}

// ═══════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════
function renderAvgCards() {
  const g = gmAvg();
  const fmt = (v, pre='', suf='') => v !== null ? pre + (Math.round(v*10)/10) + suf : '—';
  document.getElementById('avg-uitk').textContent = fmt(g.uitkering,'','%');
  document.getElementById('avg-ink').textContent  = fmt(g.inkomen,'€','k');
  document.getElementById('avg-arm').textContent  = fmt(g.armoede,'','%');
  document.getElementById('avg-huur').textContent = fmt(g.huurcorp,'','%');
}

function renderRankList() {
  const codes = buurtCodes();
  const tabField = {
    score:  null,
    uitk:   cbsFields.uitkering,
    ink:    cbsFields.inkomen,
    arm:    cbsFields.armoede,
    huur:   cbsFields.huurcorp,
  };

  const sorted = [...codes].sort((a,b) => {
    if (panelTab === 'score') {
      return (scores[b] ?? -1) - (scores[a] ?? -1);
    }
    const field = tabField[panelTab];
    const va = cbsVal(a, field) ?? (panelTab==='ink' ? Infinity : -Infinity);
    const vb = cbsVal(b, field) ?? (panelTab==='ink' ? Infinity : -Infinity);
    return panelTab === 'ink' ? va - vb : vb - va;
  });

  const labelFn = code => {
    if (panelTab === 'score') {
      const s = scores[code];
      return s !== null ? Math.round(s) : '—';
    }
    const field = tabField[panelTab];
    const v = cbsVal(code, field);
    if (v === null) return '—';
    if (panelTab === 'ink') return '€' + Math.round(v) + 'k';
    return Math.round(v*10)/10 + '%';
  };

  const colorFn = code => {
    if (panelTab === 'score') return scoreColor(scores[code] ?? null);
    const saved = mapMode;
    const modeMap = {uitk:'uitk',ink:'ink',arm:'arm',huur:'huur'};
    const tmp = modeMap[panelTab] || 'score';
    mapMode = tmp;
    const c = getColor(code);
    mapMode = saved;
    return c;
  };

  const lbl = {score:'Hoogste kwetsbaarheid',uitk:'Hoogste uitkeringen',ink:'Laagste inkomen',arm:'Hoogste armoede',huur:'Hoogste corp. huur'};
  document.getElementById('rank-lbl').lastChild.textContent = ' ' + (lbl[panelTab]||'');

  document.getElementById('rank-list').innerHTML = sorted.map(code => {
    const naam = getName(code);
    const sc   = labelFn(code);
    const col  = colorFn(code);
    return `<div class="rank-item${selectedCode===code?' active':''}" data-code="${code}"
      onclick="rankClick('${code}')">
      <div class="rank-dot" style="background:${col}"></div>
      <div class="rank-name">${naam}</div>
      <div class="rank-score" style="background:${col}22;color:${col==='#cccccc'?'#999':col}">${sc}</div>
    </div>`;
  }).join('');
}

function rankClick(code) {
  const naam = getName(code);
  selectBuurt(code, naam, null);
  // zoom map
  if (geoLayer) {
    geoLayer.eachLayer(l => {
      if (norm(l.feature?.properties?.buurtcode) === code) {
        try { map.fitBounds(l.getBounds(), { padding:[40,40], maxZoom:15 }); } catch(e){}
        l.setStyle({ fillOpacity:0.95, weight:3 });
      } else {
        l.setStyle({ fillOpacity:0.72, weight:1.5 });
      }
    });
  }
}

// ═══════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════
async function loadGeo() {
  try {
    const url = `https://service.pdok.nl/cbs/wijkenbuurten/2024/wfs/v1_0?service=WFS&version=2.0.0`
      + `&request=GetFeature&typeName=buurten&outputFormat=application%2Fjson`
      + `&CQL_FILTER=gemeentecode%3D%27${GM}%27&count=300`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const j = await r.json();
    geoFeatures = (j.features||[]).filter(f=>f.geometry);
    updatePill('p-geo','ok',`✓ kaart (${geoFeatures.length} buurten)`);
    return true;
  } catch(e) {
    updatePill('p-geo','err','✗ kaart');
    console.warn('PDOK:', e);
    return false;
  }
}

async function loadCBS() {
  try {
    // Sample row for field discovery
    const sUrl = `https://opendata.cbs.nl/ODataApi/odata/${CBS_TABLE}/TypedDataSet?`
      + `%24filter=startswith(Codering_3,'BU${GM}')&%24format=json&%24top=1`;
    const sr = await fetch(sUrl);
    if (!sr.ok) throw new Error(sr.status);
    const sj = await sr.json();
    const row0 = (sj.value||[])[0];
    if (!row0) throw new Error('geen rijen');
    const keys = Object.keys(row0);
    // Discover fields
    for (const [f, cands] of Object.entries(FIELD_CANDIDATES)) {
      cbsFields[f] = cands.find(c => keys.includes(c)) || keys.find(k => {
        const pmap = {
          inwoners:['AantalInwoners','TotaalInwoners'],
          inkomen:['GemiddeldInkomen','GemiddeldPersoonlijk'],
          uitkering:['PersonenMetEenUitkering','TotaalPersonenMet'],
          huurcorp:['HuurwoningenInBezit','WoningenInBezitVan'],
          armoede:['PersonenInArmoede','k_40Personen'],
        };
        return (pmap[f]||[]).some(p => k.startsWith(p));
      }) || null;
    }
    console.log('CBS fields:', cbsFields);
    // Full fetch
    const sel = ['WijkenEnBuurten','Codering_3',...Object.values(cbsFields).filter(Boolean)].join(',');
    const dUrl = `https://opendata.cbs.nl/ODataApi/odata/${CBS_TABLE}/TypedDataSet?`
      + `%24filter=startswith(Codering_3,'BU${GM}')&%24format=json`
      + `&%24select=${encodeURIComponent(sel)}&%24top=200`;
    const dr = await fetch(dUrl);
    if (!dr.ok) throw new Error(dr.status);
    const dj = await dr.json();
    (dj.value||[]).forEach(r => {
      const c = norm(r.Codering_3);
      if (c.startsWith('BU')) cbsData[c] = r;
    });
    const n = Object.keys(cbsData).length;
    updatePill('p-cbs','ok',`✓ CBS 2025 (${n} buurten)`);
    return true;
  } catch(e) {
    updatePill('p-cbs','err','✗ CBS');
    console.error('CBS:', e);
    return false;
  }
}

async function loadLeefbaarometer() {
  const layers = ['lbm3:lbm3_buurtscore_2022','lbm3_buurtscore_2022','lbm3:buurtscore2022'];
  for (const layer of layers) {
    try {
      const url = `https://geo.leefbaarometer.nl/lbm3/ows?service=WFS&version=2.0.0`
        + `&request=GetFeature&typeName=${encodeURIComponent(layer)}`
        + `&outputFormat=application%2Fjson`
        + `&CQL_FILTER=gm_code%3D%27GM${GM}%27&count=300`;
      const r = await fetch(url, { signal:AbortSignal.timeout(10000) });
      if (!r.ok) continue;
      const j = await r.json();
      const feats = j.features || [];
      if (!feats.length) continue;
      let n = 0;
      feats.forEach(f => {
        const p = f.properties || {};
        const sc = p.lbm3_score ?? p.lbm_score ?? p.score_lbm ?? p.score ?? null;
        const raw = p.bu_code ?? p.buurtcode ?? '';
        const code = norm(raw.startsWith('BU') ? raw : 'BU'+raw);
        if (code && sc !== null) { lbmData[code] = Number(sc); n++; }
      });
      if (n > 0) {
        updatePill('p-lbm','ok',`✓ leefbaarheid 2022`);
        document.getElementById('m-lbm').disabled = false;
        document.getElementById('m-lbm').style.opacity = '1';
        return;
      }
    } catch(e) { continue; }
  }
  updatePill('p-lbm','err','✗ leefbaarheid');
}

// ═══════════════════════════════════════════
// MODE SWITCHING
// ═══════════════════════════════════════════
function setMapMode(mode) {
  mapMode = mode;
  document.querySelectorAll('.mmode').forEach(b => b.classList.remove('active'));
  document.getElementById('m-'+mode)?.classList.add('active');
  if (geoLayer) renderGeoLayer();
  renderLegend();
  renderRankList();
}

function switchTab(tab) {
  panelTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  renderRankList();
}

// ═══════════════════════════════════════════
// MISC
// ═══════════════════════════════════════════
function updatePill(id, cls, text) {
  const el = document.getElementById(id);
  if (el) { el.className = 'xp ' + cls; el.textContent = text; }
}

function hideLoader() {
  const l = document.getElementById('loader');
  if (l) l.classList.add('hidden');
  setTimeout(() => { if(l) l.style.display='none'; }, 500);
}
